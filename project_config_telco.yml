prd:
  catalog_name: mlops_prd
  schema_name: telco_churn
acc:
  catalog_name: mlops_acc
  schema_name: telco_churn
dev:
  catalog_name: mlops_dev
  schema_name: telco_churn


experiment_name_basic: /Shared/telco-churn-basic
experiment_name_custom: /Shared/telco-churn-custom

parameters:
  n_estimators: 200
  max_depth: 8
  min_samples_split: 5
  min_samples_leaf: 10
  max_features: "sqrt"
  random_state: 42
  n_jobs: -1


num_features:
  - tenure
  - MonthlyCharges
  - TotalCharges

cat_features:
  - gender
  - SeniorCitizen
  - Partner
  - Dependents
  - tenure
  - PhoneService
  - MultipleLines
  - InternetService
  - OnlineSecurity
  - OnlineBackup
  - DeviceProtection
  - TechSupport
  - StreamingTV
  - StreamingMovies
  - Contract
  - PaperlessBilling
  - PaymentMethod

target: Churn
